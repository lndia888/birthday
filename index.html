<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:#ff416c;
}

#message{
display:none;
margin-top:20px;
}

.photo{
width:220px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px white;
}

.cake{
font-size:70px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

#text{
font-size:26px;
margin-top:15px;
}

</style>
</head>

<body>

<h1>🎁 Surprise 🎁</h1>

<button onclick="start()">Click Here</button>

<div id="message">

<div class="cake">🎂</div>

<img src="photo.jpg" class="photo">

<div id="text"></div>

</div>

<audio id="song">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

function start(){

document.getElementById("message").style.display="block";

document.getElementById("song").play();

typeMessage();

confetti();

}

let msg="Happy Birthday 🎉 May your life be full of happiness and success ❤️";

let i=0;

function typeMessage(){

if(i<msg.length){

document.getElementById("text").innerHTML+=msg.charAt(i);

i++;

setTimeout(typeMessage,60);

}

}

function confetti(){

for(let i=0;i<40;i++){

let conf=document.createElement("div");

conf.style.position="fixed";

conf.style.width="10px";

conf.style.height="10px";

conf.style.background="yellow";

conf.style.left=Math.random()*window.innerWidth+"px";

conf.style.top="-10px";

conf.style.opacity="0.8";

document.body.appendChild(conf);

let fall=setInterval(()=>{

conf.style.top=parseInt(conf.style.top)+5+"px";

if(parseInt(conf.style.top)>window.innerHeight){

clearInterval(fall);

conf.remove();

}

},30);

}

}

</script>

</body>
</html>
