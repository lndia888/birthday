<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

.photo{
width:230px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px white;
}

#message{
display:none;
font-size:26px;
margin-top:20px;
}

.cake{
font-size:80px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

canvas{
position:fixed;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container">

<h1>🎁 Surprise wifey 🎁</h1>

<button onclick="start()">Click Here</button>

<div id="message">

<div class="cake">🎂</div>

<img src="photo.png" class="photo">

<h2 id="text"></h2>

</div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

function start(){
document.getElementById("message").style.display="block";
document.getElementById("music").play();
typeText();
}

let msg="Happy Birthday Happy Birthday meri jaan ❤️
Agar tum ye message padh rahi ho to samajh lo ki meri zindagi ki sabse special person ka aaj birthday hai.
Tum meri life ki sabse pyari khushi ho. Tumhare saath har din aur bhi beautiful lagta hai.
Thank you meri life me itna pyaar, care aur happiness lane ke liye.
Main hamesha tumhara khayal rakhne ki koshish karunga.
Bhagwaan se bas itni dua hai ki tum hamesha khush raho, kyunki tumhari smile meri duniya hai.
I love you so much
Tumhari life hamesha khushiyon se bhari rahe ✨  
Aur tumhare saare sapne poore ho ❤️❤️";

let i=0;

function typeText(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(typeText,60);
}
}

</script>

</body>
</html>
